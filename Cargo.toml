[package]
name = "mem"
version = "0.1.1"
edition = "2021"
default-run = "mem"

[lib]
doctest = false

[features]
default = []
# Compile in the LanceDB backend (`mem::storage::lancedb`). Off by default —
# pulls in the lance/arrow stack, which is heavy and orthogonal to the DuckDB
# happy path. Enable with `cargo build --features lancedb` to use the alternate
# backend.
lancedb = ["dep:lancedb", "dep:arrow-array", "dep:futures"]

[dependencies]
lancedb = { version = "0.27", optional = true }
# arrow-array must be pinned to lancedb 0.27's transitive 57.x — otherwise
# cargo can resolve to 58.x for our direct dep, leaving two distinct
# `RecordBatch` types in the dep graph that fail to typecheck across the
# Table::add boundary. (lancedb re-exports `arrow_schema` via
# `lancedb::arrow::arrow_schema`, so we don't need a direct dep on that.)
arrow-array = { version = "57", optional = true }
# `futures::TryStreamExt::try_collect` collapses LanceDB's
# `SendableRecordBatchStream` into a `Vec<RecordBatch>`. lancedb already
# pulls futures transitively, but cargo doesn't expose transitive deps as
# importable, so we need a direct dep here too.
futures = { version = "0.3", optional = true }
anyhow = "1"
async-trait = "0.1"
axum = "0.8"
clap = { version = "4", features = ["derive"] }
duckdb = { version = "1", features = ["bundled"] }
rmcp = { version = "1.5", features = ["server", "macros", "transport-io"] }
schemars = "0.8"
embed_anything = { git = "https://github.com/StarlightSearch/EmbedAnything" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
regex = "1"
sha2 = "0.10"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
thiserror = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "net"] }
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
tempfile = "3"
once_cell = "1"
tiktoken-rs = "0.11"
uuid = { version = "1", features = ["v5", "v7"] }
usearch = { version = "2", default-features = false }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
rust-embed = { version = "8", features = ["debug-embed"] }
tantivy = "0.22"
r2d2 = "0.8"

[dev-dependencies]
rand = "0.8"

# PoC: probe the Lance DuckDB extension's row-level DML capabilities and
# Rust-write→DuckDB-read visibility model. Run with:
#   cargo run --example lance_duckdb_poc --features lancedb
# Requires network at first run (community extension download).
[[example]]
name = "lance_duckdb_poc"
required-features = ["lancedb"]
