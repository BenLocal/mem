name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  mem-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: integrations/mem-mcp/package-lock.json
      - name: npm ci
        working-directory: integrations/mem-mcp
        run: npm ci
      - name: npm test
        working-directory: integrations/mem-mcp
        run: npm test
      - name: npm run build
        working-directory: integrations/mem-mcp
        run: npm run build
