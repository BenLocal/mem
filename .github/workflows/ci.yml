name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*.*.*"]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    # Drop debuginfo from the test profile. Linking the `cargo test`
    # binaries against the heavy lance dependency tree is
    # memory-heavy, and debuginfo is the bulk of that — it OOM-killed
    # `cc`/`ld` on the 7 GB ubuntu-latest runner ("error: linking with
    # `cc` failed"), intermittently and only in CI (local boxes have
    # more RAM). `debug = 0` for the test profile cuts link-time memory
    # sharply with no effect on test results. (fmt/clippy don't link, so
    # job-level scope is harmless to them; the release-profile cross job
    # already builds without debuginfo.)
    env:
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      # The default build now compiles postgres + clickhouse + lance — a large
      # target tree that exhausted the ~14 GB ubuntu-latest disk ("No space left
      # on device" while lance wrote test datasets). Reclaim ~25 GB of
      # preinstalled bloat (dotnet / android / haskell / docker images) first.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # Cache the cargo registry + target dir. Without this the job
      # cold-compiled the heavy lance dependency tree (~20 min)
      # on every push; an incremental restore cuts that to a few
      # minutes. Distinct `shared-key` from the cross job so the two
      # don't clobber each other's caches (different targets/profiles).
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-test
      # `lance-encoding`'s build script invokes `prost-build` to compile
      # `.proto` files. The runner's apt protobuf-compiler ships an
      # ancient (~3.12) protoc that doesn't bundle
      # `google/protobuf/empty.proto`; lance imports it. Use
      # arduino/setup-protoc to pin a recent release instead.
      - uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  # Postgres backend parity. The backend is a default dependency now, so the
  # `rust` job above already compiles + clippy-lints it; this job adds the one
  # thing that job can't — running tests/postgres_backend.rs against a live
  # pgvector Postgres (the parity suite self-skips without MEM_TEST_POSTGRES_URL).
  postgres:
    runs-on: ubuntu-latest
    env:
      CARGO_PROFILE_TEST_DEBUG: "0"
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: mem
          POSTGRES_DB: mem
        ports:
          - 5432:5432
        # Wait for the DB to accept connections before the job's steps run.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      # Free ~25 GB of preinstalled bloat before the heavy default-deps build
      # (see the `rust` job comment — same disk-exhaustion risk).
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-postgres
      # lance's build script needs a recent protoc (see the `rust` job).
      - uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # Clippy over this code runs in the `rust` job (default dependency).
      - run: cargo test --test postgres_backend
        env:
          MEM_TEST_POSTGRES_URL: postgres://postgres:mem@localhost:5432/mem

  # ClickHouse backend parity. Like the postgres job: the backend is a default
  # dependency (compiled + linted by `rust`), so this job only runs
  # tests/clickhouse_backend.rs against a live ClickHouse (the suite self-skips
  # without MEM_TEST_CLICKHOUSE_URL).
  clickhouse:
    runs-on: ubuntu-latest
    env:
      CARGO_PROFILE_TEST_DEBUG: "0"
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:26.5
        # CLICKHOUSE_USER creates an open (non-localhost-restricted) user;
        # recent images restrict the bare `default` user to localhost, so the
        # job (connecting via the mapped port from outside the container)
        # needs an explicit user. The test URL carries the creds.
        env:
          CLICKHOUSE_USER: mem
          CLICKHOUSE_PASSWORD: mem
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        ports:
          - 8123:8123
        options: >-
          --health-cmd "clickhouse-client --user mem --password mem --query 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      # Free ~25 GB of preinstalled bloat before the heavy default-deps build
      # (see the `rust` job comment — same disk-exhaustion risk).
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-clickhouse
      # lance's build script needs a recent protoc (see the `rust` job).
      - uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # Clippy over this code runs in the `rust` job (default dependency).
      - run: cargo test --test clickhouse_backend
        env:
          MEM_TEST_CLICKHOUSE_URL: http://mem:mem@localhost:8123

  rust-cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-linux
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build release (x86_64-unknown-linux-gnu)
        run: cross build --release --target x86_64-unknown-linux-gnu
      - name: Build release (x86_64-unknown-linux-musl)
        run: cross build --release --target x86_64-unknown-linux-musl
