name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*.*.*"]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    # Drop debuginfo from the test profile. Linking the `cargo test`
    # binaries against the full lance + duckdb dependency tree is
    # memory-heavy, and debuginfo is the bulk of that — it OOM-killed
    # `cc`/`ld` on the 7 GB ubuntu-latest runner ("error: linking with
    # `cc` failed"), intermittently and only in CI (local boxes have
    # more RAM). `debug = 0` for the test profile cuts link-time memory
    # sharply with no effect on test results. (fmt/clippy don't link, so
    # job-level scope is harmless to them; the release-profile cross job
    # already builds without debuginfo.)
    env:
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # Cache the cargo registry + target dir. Without this the job
      # cold-compiled the full lance + duckdb dependency tree (~20 min)
      # on every push; an incremental restore cuts that to a few
      # minutes. Distinct `shared-key` from the cross job so the two
      # don't clobber each other's caches (different targets/profiles).
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-test
      # `lance-encoding`'s build script invokes `prost-build` to compile
      # `.proto` files. The runner's apt protobuf-compiler ships an
      # ancient (~3.12) protoc that doesn't bundle
      # `google/protobuf/empty.proto`; lance imports it. Use
      # arduino/setup-protoc to pin a recent release instead.
      - uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  rust-cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-linux
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build release (x86_64-unknown-linux-gnu)
        run: cross build --release --target x86_64-unknown-linux-gnu
      - name: Build release (x86_64-unknown-linux-musl)
        run: cross build --release --target x86_64-unknown-linux-musl
