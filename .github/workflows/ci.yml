name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*.*.*"]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  rust-cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-linux
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build release (x86_64-unknown-linux-gnu)
        run: cross build --release --target x86_64-unknown-linux-gnu
      - name: Build release (x86_64-unknown-linux-musl)
        run: cross build --release --target x86_64-unknown-linux-musl

  mem-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: integrations/mem-mcp/package-lock.json
      - name: npm ci
        working-directory: integrations/mem-mcp
        run: npm ci
      - name: npm test
        working-directory: integrations/mem-mcp
        run: npm test
      - name: npm run build
        working-directory: integrations/mem-mcp
        run: npm run build
