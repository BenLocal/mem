name: Release

on:
  push:
    tags: ["v*.*.*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  mem-binaries:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-linux-release
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build release (x86_64-unknown-linux-gnu)
        run: cross build --release --target x86_64-unknown-linux-gnu
      - name: Build release (x86_64-unknown-linux-musl)
        run: cross build --release --target x86_64-unknown-linux-musl
      - name: Stage binaries for upload
        run: |
          cp "target/x86_64-unknown-linux-gnu/release/mem" \
            "mem-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu"
          cp "target/x86_64-unknown-linux-musl/release/mem" \
            "mem-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl"
          chmod +x "mem-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu" \
            "mem-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl"
      - name: SHA256 checksums
        run: |
          sha256sum \
            "mem-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu" \
            "mem-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl" \
            > "mem-${GITHUB_REF_NAME}-SHA256SUMS"
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            mem-${{ github.ref_name }}-x86_64-unknown-linux-gnu
            mem-${{ github.ref_name }}-x86_64-unknown-linux-musl
            mem-${{ github.ref_name }}-SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-mem:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lowercase image owner (GHCR)
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/mem:${{ github.ref_name }}
            ghcr.io/${{ env.IMAGE_OWNER }}/mem:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── npm package → npmjs.org ───────────────────────────────────────
  # Publishes packaging/npm (@benlocal/mem), whose postinstall downloads the
  # prebuilt binary from THIS release — so it must run AFTER mem-binaries has
  # created the release and uploaded the assets, or a fresh `npm install`
  # would 404. Requires an NPM_TOKEN repo secret (Automation token with
  # publish rights); never hardcode it.
  npm-publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: mem-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Set package version from tag
        working-directory: packaging/npm
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Publish
        working-directory: packaging/npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
